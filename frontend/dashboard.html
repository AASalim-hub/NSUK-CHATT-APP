<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #ece5dd;
    }

    header {
      background: #075e54;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
    }

    .card:hover {
      background: #f0f0f0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <h3 id="welcome"></h3>
</header>

<div class="container">

  <div class="card" onclick="join('general')">🌍 General Chat (All Students)</div>
  <div class="card" onclick="join('faculty')">🏫 Faculty Chat</div>
  <div class="card" onclick="join('department')">📘 Department Chat</div>
  <div class="card" onclick="join('level')">🎓 Level Chat</div>

  <div class="card" onclick="settings()">⚙️ Settings</div>

  <button onclick="logout()">Logout</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

document.getElementById("welcome").innerText =
  "Welcome, " + user.name;

function join(type) {
  localStorage.setItem("chatType", type);
  window.location = "chat.html";
}

function settings() {
  window.location = "settings.html";
}

function logout() {
  localStorage.removeItem("user");
  window.location = "login.html";
}
</script>

</body>
</html>
