<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #075e54;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
    }

    h2 {
      text-align: center;
      color: #075e54;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #25d366;
      border: none;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #128c7e;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>NSUK Chat - Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>
    <a href="signup.html">Create Account</a>
  </p>
</div>

<script src="login.js"></script>

<script>
async function login() {
  try {
    const res = await fetch("https://nsuk-chatt-app.onrender.com/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      })
    });

    const text = await res.text();   // 👈 get raw response first
    console.log("RAW RESPONSE:", text);

    let data;
    try {
      data = JSON.parse(text); // try to convert to JSON
    } catch (err) {
      alert("Server did not return JSON");
      return;
    }

    console.log("PARSED DATA:", data);

    if (data.user) {
      localStorage.setItem("user", JSON.stringify(data.user));
      alert("Login successful");
      window.location.href = "dashboard.html";
    } else {
      alert("Login failed: " + text);
    }

  } catch (error) {
    console.log("ERROR:", error);
    alert("Something went wrong");
  }
}
</script>

</body>
</html>
