<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>

  <style>
    body {
      font-family: Arial;
      background: #075e54;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 300px;
    }

    h2 {
      text-align: center;
      color: #075e54;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #25d366;
      border: none;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #128c7e;
    }

    p {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>NSUK Chat - Sign Up</h2>

  <input id="name" placeholder="Full Name">
  <input id="username" placeholder="Username">
  <input id="phone" placeholder="Phone Number">
  <input id="email" placeholder="NSUK Email">
  <input id="matric" placeholder="Matric Number">

  <select id="faculty">
    <option value="">Select Faculty</option>
    <option>Natural and Applied Sciences</option>
    <option>Engineering</option>
    <option>Education</option>
    <option>Art</option>
    <option>Administration</option>
    <option>Social Science</option>
    <option>Law</option>
    <option>Allied Science</option>
  </select>

  <select id="department"></select>

  <select id="level">
    <option value="">Select Level</option>
    <option>100L</option>
    <option>200L</option>
    <option>300L</option>
    <option>400L</option>
  </select>

  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>

  <p>Already have an account?  
    <a href="login.html">Login</a>
  </p>
</div>

<script src="signup.js"></script>

<script>

// ✅ FACULTY → DEPARTMENT DATA
const facultyDepartments = {
  "Natural and Applied Sciences": [
    "Computer Science",
    "Mathematics",
    "Physics",
    "Chemistry"
  ],
  "Engineering": [
    "Electrical Engineering",
    "Mechanical Engineering",
    "Civil Engineering"
  ],
  "Education": [
    "Educational Management",
    "Guidance and Counselling"
  ],
  "Art": [
    "English",
    "History"
  ],
  "Administration": [
    "Business Administration",
    "Public Administration"
  ],
  "Social Science": [
    "Economics",
    "Political Science"
  ],
  "Law": [
    "Law"
  ],
  "Allied Science": [
    "Nursing",
    "Medical Laboratory Science"
  ]
};

// ✅ UPDATE DEPARTMENTS WHEN FACULTY CHANGES
document.getElementById("faculty").addEventListener("change", function () {
  const faculty = this.value;
  const departmentSelect = document.getElementById("department");

  // Clear old options
  departmentSelect.innerHTML = '<option value="">Select Department</option>';

  if (facultyDepartments[faculty]) {
    facultyDepartments[faculty].forEach(dep => {
      const option = document.createElement("option");
      option.value = dep;
      option.textContent = dep;
      departmentSelect.appendChild(option);
    });
  }
});

// ✅ SIGNUP FUNCTION
async function signup() {
  try {
    const res = await fetch("http://localhost:3000/api/auth/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        username: document.getElementById("username").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        matric: document.getElementById("matric").value,
        password: document.getElementById("password").value,
        faculty: document.getElementById("faculty").value,
        department: document.getElementById("department").value,
        level: document.getElementById("level").value
      })
    });

    const text = await res.text();

    console.log("SIGNUP RESPONSE:", text);

    alert(text);

    if (text.toLowerCase().includes("successful")) {
      window.location = "login.html";
    }

  } catch (err) {
    console.log("ERROR:", err);
    alert("Signup failed");
  }
}

// ✅ GO TO LOGIN
function goLogin() {
  window.location = "login.html";
}

</script>

</body>
</html>
